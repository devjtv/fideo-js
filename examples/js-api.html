<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fideo JS — JavaScript API Demo</title>
    <link rel="stylesheet" href="../dist/styles.css" />
    <script src="../dist/fideo.global.js"></script>
    <style>
      body {
        margin: 0;
        padding: 40px 20px;
        background: #0f1412;
        color: #e8ede9;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        line-height: 1.55;
      }

      main {
        max-width: 860px;
        margin: 0 auto;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 32px;
        font-weight: 700;
      }

      p.lead {
        margin: 0 0 28px;
        color: #98a39b;
        font-size: 16px;
      }

      .demo-player {
        margin-bottom: 28px;
      }

      .controls-card {
        display: grid;
        gap: 16px;
        padding: 20px;
        background: #181f1b;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 10px;
      }

      .control-row {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
      }

      .control-row label {
        font-size: 13px;
        font-weight: 600;
        color: #b8c4bc;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }

      button {
        padding: 9px 14px;
        font-size: 14px;
        font-weight: 600;
        color: #e8ede9;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 6px;
        cursor: pointer;
        transition: background 140ms ease, transform 100ms ease;
      }

      button:hover {
        background: rgba(255, 255, 255, 0.14);
      }

      button:active {
        transform: scale(0.97);
      }

      button.primary {
        background: #46d9a7;
        color: #07100d;
        border-color: #46d9a7;
      }

      button.primary:hover {
        background: #3bc594;
      }

      input[type="range"] {
        width: 160px;
        accent-color: #46d9a7;
      }

      .event-log {
        height: 180px;
        padding: 12px 14px;
        overflow-y: auto;
        font-family: ui-monospace, "SF Mono", Menlo, monospace;
        font-size: 12px;
        line-height: 1.6;
        color: #a8b5ad;
        background: #0b100d;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 8px;
      }

      .event-log .event-entry {
        margin: 0;
        padding: 1px 0;
      }

      .event-log .event-entry strong {
        color: #46d9a7;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>JavaScript API Demo</h1>
      <p class="lead">
        Control the player from your own buttons, listen to playback events, and read live state.
      </p>

      <div class="demo-player">
        <video
          id="api-player"
          data-fideo
          data-fideo-src="https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.mp4"
          data-fideo-poster="https://interactive-examples.mdn.mozilla.net/media/examples/flower.jpg"
        ></video>
      </div>

      <div class="controls-card">
        <div class="control-row">
          <label>Playback</label>
          <button class="primary" onclick="player.play()">Play</button>
          <button onclick="player.pause()">Pause</button>
          <button onclick="seekTo(5)">Seek to 5s</button>
          <button onclick="seekTo(15)">Seek to 15s</button>
        </div>

        <div class="control-row">
          <label>Volume</label>
          <button onclick="toggleMute()">Mute / Unmute</button>
          <input
            id="volume-slider"
            type="range"
            min="0"
            max="1"
            step="0.05"
            value="1"
            oninput="setVolume(this.value)"
          />
          <span id="volume-value">100%</span>
        </div>

        <div class="control-row">
          <label>State</label>
          <button onclick="toggleFullscreen()">Toggle Fullscreen</button>
          <button onclick="logCurrentState()">Log State to Console</button>
          <button onclick="clearLog()">Clear Log</button>
        </div>
      </div>

      <h2 style="margin-top: 28px; font-size: 18px;">Event Log</h2>
      <div id="event-log" class="event-log"></div>
    </main>

    <script>
      const video = document.querySelector('#api-player');

      // Initialise the player via the JS API instead of data attributes
      const player = new Fideo('#api-player', {
        muted: true,
        loop: true,
        controls: true,
        sources: {
          desktop: 'https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.mp4',
        },
        posters: {
          desktop: 'https://interactive-examples.mdn.mozilla.net/media/examples/flower.jpg',
        },
      });

      const logEl = document.getElementById('event-log');

      function logEvent(name, detail) {
        const entry = document.createElement('p');
        entry.className = 'event-entry';
        const time = new Date().toLocaleTimeString();
        const state = detail?.state
          ? `paused=${detail.state.paused}  time=${Math.round(detail.state.currentTime)}s  volume=${Math.round(detail.state.volume * 100)}%`
          : '';
        entry.innerHTML = `<strong>${name}</strong> &nbsp; <span style="color:#6b7a70">${time}</span> &nbsp; ${state}`;
        logEl.prepend(entry);
      }

      // Listen to every Fideo event fired on the original element
      const events = ['fideo:play', 'fideo:pause', 'fideo:ended', 'fideo:timeupdate', 'fideo:volumechange', 'fideo:change'];
      for (const eventName of events) {
        video.addEventListener(eventName, (e) => logEvent(eventName, e.detail));
      }

      function seekTo(seconds) {
        player.adapter.seek(seconds).catch(() => undefined);
      }

      function toggleMute() {
        const state = player.adapter.getState();
        player.adapter.setMuted(!state.muted).catch(() => undefined);
      }

      function setVolume(value) {
        const v = parseFloat(value);
        player.adapter.setVolume(v).catch(() => undefined);
        player.adapter.setMuted(v === 0).catch(() => undefined);
        document.getElementById('volume-value').textContent = `${Math.round(v * 100)}%`;
      }

      function toggleFullscreen() {
        if (document.fullscreenElement) {
          document.exitFullscreen();
        } else {
          player.wrapper.requestFullscreen?.();
        }
      }

      function logCurrentState() {
        const state = player.adapter.getState();
        console.log('Current Fideo state:', state);
        logEvent('manual:state', { state });
      }

      function clearLog() {
        logEl.innerHTML = '';
      }
    </script>
  </body>
</html>
